spring.application.name=exchange

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/exchange}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:exchange}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:exchange}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true