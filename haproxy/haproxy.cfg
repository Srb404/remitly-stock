global
    log stdout format raw local0
    maxconn 2048

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  http-server-close
    option  forwardfor
    option  redispatch
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

frontend http_front
    bind *:80
    default_backend exchange_backend

backend exchange_backend
    balance roundrobin
    option httpchk GET /actuator/health/readiness
    http-check expect status 200
    default-server inter 2s fall 2 rise 2 init-addr last,libc,none
    server app1 app1:8080 check
    server app2 app2:8080 check
    server app3 app3:8080 check
